logging:
  level:
    com.github.bkhablenko: debug

# Spring Boot Actuator
management:
  server:
    port: 9080
  endpoints:
    web:
      exposure:
        include: health, prometheus
      path-mapping:
        prometheus: metrics
  endpoint:
    health:
      probes:
        enabled: true

spring:
  application:
    name: kotlin-spring-boot-template

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:${spring.application.name}}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    hikari:
      connection-timeout: 15000
      leak-detection-threshold: 10000
      maximum-pool-size: 15

  jpa:
    open-in-view: false
    properties:
      hibernate.query.hql.json_functions_enabled: true
